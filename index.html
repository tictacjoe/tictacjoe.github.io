<!DOCTYPE html>
<html>
  <head>
    <title>Joseph Kidd</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-135288989-1"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'UA-135288989-1');
    </script>
    <link rel="stylesheet" type="text/css" href="/css/main.css">
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="https://github.com/tictacjoe">GitHub</a></li>
      </ul>
    </nav>
    <div class="container">
      <div class="blurb">
        <h1>Joseph Kidd</h1>
        
        <img src="/pics/weblake.png" alt="Lake view" class="hero-image">

        <h2>Projects</h2>
        <div class="projects-grid" id="projectsGrid">
          <a href="/streambrowser.html" class="project-card">
            <div class="meta">
              <strong>StreamBrowser</strong>
              <div>Interactive media browsing interface.</div>
            </div>
          </a>
          <a href="/netflix-browse/index.html" class="project-card hidden-project">
            <div class="meta">
              <strong>Netflix Browse</strong>
              <div>Explore and filter Netflix categories.</div>
            </div>
          </a>
          <a href="/event-control.html" class="project-card hidden-project">
            <div class="meta">
              <strong>Event Control</strong>
              <div>Interface for managing logic and events.</div>
            </div>
          </a>
          <a href="/family-tree/" class="project-card hidden-project">
            <div class="meta">
              <strong>Family Tree</strong>
              <div>React-based genealogy visualization.</div>
            </div>
          </a>
        </div>
        <button class="show-all-btn" id="toggleBtn">Show more projects</button>
      </div>
    </div>
    <footer>
      <ul>
        <li><a href="mailto:tictacjoe@gmail.com">email</a></li>
        <li><a href="https://github.com/tictacjoe">github.com/tictacjoe</a></li>
      </ul>
    </footer>

    <script>
      const toggleBtn = document.getElementById('toggleBtn');
      const hiddenProjects = document.querySelectorAll('.hidden-project');
      let isVisible = false;

      toggleBtn.addEventListener('click', () => {
        isVisible = !isVisible;
        hiddenProjects.forEach(p => {
          p.classList.toggle('hidden-project', !isVisible);
        });
        toggleBtn.textContent = isVisible ? 'Show fewer projects' : 'Show more projects';
      });
    </script>
  </body>
</html>
